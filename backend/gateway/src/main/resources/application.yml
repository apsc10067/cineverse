server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      routes:
        - id: auth-service
          uri: ${ROUTE_AUTH_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**
        - id: movie-service
          uri: ${ROUTE_MOVIE_URL:http://localhost:8082}
          predicates:
            - Path=/api/movies/**
        - id: review-service
          uri: ${ROUTE_REVIEW_URL:http://localhost:8083}
          predicates:
            - Path=/api/reviews/**
