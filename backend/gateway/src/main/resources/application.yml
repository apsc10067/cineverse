server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
        - id: movie-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/movies/**
        - id: review-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/reviews/**
